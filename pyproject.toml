[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "facebook-profile-scraper"
version = "0.1.0"
description = "Python SDK for the Facebook Profile Scraper Apify actor — direct Facebook scraping for public profiles and pages with verification detection, real email + phone scraping, activity score, page category, aggregate rating, address, opening hours, and an auto-generated outreach pitch. No login required."
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "ApiVault Labs" }]
keywords = [
    "facebook", "facebook-scraper", "facebook-api",
    "facebook-profile-scraper", "facebook-page-scraper",
    "facebook-no-login", "facebook-no-api-key",
    "facebook-public-data", "facebook-graph-alternative",
    "facebook-followers", "facebook-verification",
    "facebook-page-info", "facebook-page-emails",
    "facebook-business-pages", "facebook-localbusiness",
    "social-media-scraper", "social-media-intelligence",
    "lead-generation", "b2b-lead-gen", "crm-enrichment",
    "influencer-discovery", "micro-influencers", "verified-pages",
    "brand-monitoring", "competitor-research",
    "web-scraping", "apify", "apify-actor", "python-sdk",
    "hunter-alternative", "apollo-alternative",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Office/Business",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
requires-python = ">=3.9"
dependencies = [
    "requests>=2.31.0",
]

[project.urls]
Homepage = "https://github.com/apivault-labs/facebook-profile-scraper-python"
Documentation = "https://github.com/apivault-labs/facebook-profile-scraper-python#readme"
"Apify Actor" = "https://apify.com/apivault_labs/facebook-profile-scraper"
"Bug Tracker" = "https://github.com/apivault-labs/facebook-profile-scraper-python/issues"

[tool.setuptools.packages.find]
include = ["facebook_scraper*"]
